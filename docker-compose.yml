services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: intellic-postgres-db
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-intellic_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PWD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-intellic_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
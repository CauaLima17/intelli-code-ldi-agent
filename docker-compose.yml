services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: intellic-postgres-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-intellic_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PWD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: